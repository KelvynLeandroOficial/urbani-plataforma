<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbani - Geral</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f7f9fa; min-height: 100vh; padding: 15px; display: flex; justify-content: center; }
        
        .container {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 80px 1fr;
            grid-template-areas: 
                "aside header"
                "aside main";
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        /* BARRA LATERAL UNIFICADA */
        .aside {
            grid-area: aside;
            background-color: #ff5a00;
            border-radius: 0px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .profile-container {
            width: 75px;
            height: 75px;
            background-color: #1a1c24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 2px solid #fff;
        }
        .profile-icon {
            width: 32px;
            height: 32px;
            border: 3px solid #fff;
            border-radius: 50%;
            position: relative;
        }
        .profile-icon::after {
            content: '';
            position: absolute;
            width: 44px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 22px 22px 0 0;
            top: 32px;
            left: -9px;
            background-color: #1a1c24;
        }
        .nav-btn {
            width: 100%;
            background-color: #1a1c24;
            color: #ff5a00;
            padding: 15px;
            border-radius: 35px;
            text-decoration: none;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
        }
        .nav-btn.active { color: #ffffff; }

        /* CABEÇALHO UNIFICADO */
        .header {
            grid-area: header;
            background-color: #1a1c24;
            color: #ff5a00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 40px;
        }

        /* CONTEÚDO PRINCIPAL CLARO */
        .main {
            grid-area: main;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Kpis / Filtros superiores */
        .filter-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .filter-box {
            background-color: #1a1c24;
            color: #ff5a00;
            padding: 10px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 15px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .filter-input-mock {
            width: 85%;
            height: 22px;
            background-color: #ffffff;
            border-radius: 4px;
        }

        /* Corpo central em duas colunas */
        .content-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        /* Bloco Escuro do Feed */
        .feed-container {
            background-color: #1a1c24;
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 450px;
        }
        .feed-title {
            background-color: #ffffff;
            color: #1a1c24;
            padding: 10px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        /* Card de Informação Cinza */
        .card-solicitacao {
            background-color: #d1d5db;
            border-radius: 4px;
            padding: 15px;
            color: #000000;
        }
        .card-solicitacao h3 { font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .card-solicitacao p.author { font-size: 12px; font-style: italic; margin-bottom: 5px; font-weight: bold;}
        .card-solicitacao p.location { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .card-solicitacao .desc-box {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .card-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .btn-action {
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border-radius: 15px;
            border: none;
            color: #ffffff;
            cursor: pointer;
        }
        .btn-green { background-color: #4caf50; }
        .btn-red { background-color: #f44336; }
        .btn-orange { background-color: #ff9800; }

        /* Mockup do Google Maps */
        .map-container {
            background-color: #e3f2fd;
            border-radius: 4px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-icon { width: 60px; height: auto; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="aside">
            <div class="profile-container"><div class="profile-icon"></div></div>
            <button class="nav-btn active" onclick="location.href='dashboard.html'">Geral</button>
            <button class="nav-btn" onclick="location.href='nova_solicitacao.html'">Nova Solicitação</button>
            <button class="nav-btn" onclick="location.href='comunidade.html'">Comunidade</button>
            <button class="nav-btn" onclick="location.href='minhas_solicitacoes.html'">Minhas Solicitações</button>
        </aside>

        <header class="header">BEM VINDO AO URBANI</header>

        <main class="main">
            <div class="filter-row">
                <div class="filter-box">Escolha a Cidade <div class="filter-input-mock"></div></div>
                <div class="filter-box">Solicitações em Andamento <div class="filter-input-mock"></div></div>
                <div class="filter-box">Em Análise <div class="filter-input-mock"></div></div>
                <div class="filter-box">Novas <div class="filter-input-mock"></div></div>
            </div>

            <div class="content-grid">
                <div class="feed-container">
                    <div class="feed-title">Solicitações Recentes</div>
                    
                    <div class="card-solicitacao">
                        <h3>Solicitação ID-05</h3>
                        <p class="author">Usuário escreveu:</p>
                        <p class="location">Rua, Bairro, Cidade-Estado</p>
                        <div class="desc-box">
                            Problema descrito
                        </div>
                        <div class="card-actions">
                            <button class="btn-action btn-green">Apoiar</button>
                            <button class="btn-action btn-red">Denunciar</button>
                            <button class="btn-action btn-orange">Ver mais</button>
                        </div>
                    </div>
                </div>

                <div class="map-container">
                    <!-- Marcador imitando o ícone do Google Maps do wireframe -->
                    <svg class="map-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#4285F4"/>
                    </svg>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
