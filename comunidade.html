<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbani - Comunidade</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f7f9fa; min-height: 100vh; padding: 15px; display: flex; justify-content: center; }
        .container { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 80px 1fr; grid-template-areas: "aside header" "aside main"; gap: 20px; width: 100%; max-width: 1300px; }
        
        .aside { grid-area: aside; background-color: #ff5a00; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .profile-container { width: 75px; height: 75px; background-color: #1a1c24; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; border: 2px solid #fff; }
        .profile-icon { width: 32px; height: 32px; border: 3px solid #fff; border-radius: 50%; position: relative; }
        .profile-icon::after { content: ''; position: absolute; width: 44px; height: 20px; border: 3px solid #fff; border-radius: 22px 22px 0 0; top: 32px; left: -9px; background-color: #1a1c24; }
        
        .nav-btn { width: 100%; background-color: #1a1c24; color: #ff5a00; padding: 15px; border-radius: 35px; text-decoration: none; text-align: center; font-size: 11px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; }
        .nav-btn.active { color: #ffffff; }
        
        .header { grid-area: header; background-color: #1a1c24; color: #ff5a00; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; letter-spacing: 1px; border-radius: 40px; text-transform: uppercase; }
        .main { grid-area: main; display: flex; flex-direction: column; gap: 20px; }

        /* KPIs Superiores */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .kpi-box { background-color: #1a1c24; color: #ff5a00; padding: 10px; font-size: 11px; font-weight: bold; text-align: center; border-radius: 15px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .kpi-value-mock { width: 85%; height: 25px; background-color: #ffffff; border-radius: 4px; color: #000; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* Barra de Filtros em Linha Única Cinza */
        .inline-filter-bar { background-color: #d1d5db; border-radius: 15px; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; word-spacing: 5px; }

        /* Grid de Cards da Comunidade (2 por Linha) */
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-solicitacao { background-color: #d1d5db; border-radius: 4px; padding: 15px; color: #000000; }
        .card-solicitacao h3 { font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .card-solicitacao p.author { font-size: 12px; font-style: italic; margin-bottom: 5px; font-weight: bold; }
        .card-solicitacao p.location { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .card-solicitacao .desc-box { background-color: #ffffff; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        
        .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-action { padding: 8px; font-size: 12px; font-weight: bold; text-align: center; border-radius: 15px; border: none; color: #ffffff; cursor: pointer; }
        .btn-green { background-color: #4caf50; }
        .btn-red { background-color: #f44336; }
        .btn-orange { background-color: #ff9800; }
        .coming-soon-container {
    width: 100%;
    min-height: 450px;
    background-color: #1a1c24;
    border-radius: 5px;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.coming-soon-card {
    background-color: #d1d5db;
    border-radius: 10px;
    padding: 40px;
    max-width: 650px;
    text-align: center;
    color: #1a1c24;
}

.coming-soon-icon {
    font-size: 56px;
    margin-bottom: 20px;
}

.coming-soon-card h1 {
    font-size: 28px;
    color: #ff5a00;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.coming-soon-card p {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 15px;
    font-weight: bold;
}

.btn-back {
    margin-top: 15px;
    background-color: #ff5a00;
    color: #ffffff;
    border: none;
    padding: 14px 28px;
    border-radius: 25px;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
}

.btn-back:hover {
    opacity: 0.9;
}
    </style>
</head>
<body>

    <div class="container">
        <aside class="aside">
            <div class="profile-container"><div class="profile-icon"></div></div>
            <button class="nav-btn" onclick="location.href='dashboard.html'">Geral</button>
            <button class="nav-btn" onclick="location.href='nova_solicitacao.html'">Nova Solicitação</button>
            <button class="nav-btn active" onclick="location.href='comunidade.html'">Comunidade</button>
            <button class="nav-btn" onclick="location.href='minhas_solicitacoes.html'">Minhas Solicitações</button>
        </aside>

        <header class="header">Comunidade</header>

        <main class="main">
            <section class="coming-soon-container">
                <div class="coming-soon-card">
                    <div class="coming-soon-icon">🚧</div>
        
                    <h1>Comunidade em breve</h1>
        
                    <p>
                        A área de comunidade ainda está em desenvolvimento.
                    </p>
        
                    <p>
                        Em breve, os cidadãos poderão acompanhar solicitações públicas,
                        apoiar ocorrências, comentar problemas urbanos e participar mais
                        ativamente da melhoria da cidade.
                    </p>
        
                    <button class="btn-back" onclick="location.href='dashboard.html'">
                        Voltar para o painel
                    </button>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
